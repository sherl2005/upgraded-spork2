project:
  class_names:
  - happy
  - stressed
  - angry
  - calm
  - sad
  - confident
preprocessing:
  imagenet_mean:
  - 0.485
  - 0.456
  - 0.406
  imagenet_std:
  - 0.229
  - 0.224
  - 0.225
  target_size:
  - 224
  - 224
feature_extractor:
  feature_dim: 12
  cache_dir: data/feature_cache
label_generator:
  output_csv: data/labels.csv
  confidence_threshold: 0.55
dataset:
  split_ratios:
  - 0.7
  - 0.15
  - 0.15
  random_seed: 42
  confidence_threshold: 0.55
  max_samples_per_class: 500
model:
  num_classes: 6
  handcrafted_dim: 12
  projection_dim: 96
  fusion_hidden_dims:
  - 512
  - 256
  dropout: 0.35
  pretrained: true
  backbone: resnet18
  freeze_backbone: true
training:
  learning_rate: 0.0001
  batch_size: 8
  epochs: 5
  patience: 2
  grad_clip_max_norm: 1.0
  amp: false
  imbalance_strategy: weighted_loss
  random_seed: 42
  num_workers: 0
paths:
  best_model: checkpoints/best_model.pt
  scaler_path: checkpoints/feature_scaler.pkl
  log_dir: logs
  evaluation_dir: output/evaluation
nlp_fusion:
  enabled: false
  fusion_weight: 0.4
  high_arousal_terms:
  - hate
  - furious
  - rage
  - panic
evaluation:
  calibration: true
  calibration_bins: 10
